<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Runner Pro - Performance Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- LOGIN VIEW -->
    <section id="view-login" class="view active h-screen flex flex-col items-center justify-center bg-cover bg-center px-6">
        <div class="glass p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="mb-8">
                <div class="bg-orange-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg rotate-3">
                    <i class="fas fa-running text-white text-3xl"></i>
                </div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter">RUNNER<span class="text-orange-600 italic">PRO</span></h1>
            </div>
            <div class="space-y-4">
                <button onclick="app.navigateTo('view-athlete-home')" class="w-full bg-white border-2 border-slate-100 py-4 px-6 rounded-2xl flex items-center justify-between font-bold shadow-sm active:scale-95 group">
                    <span class="flex items-center gap-3"><i class="fas fa-user-astronaut text-orange-600 text-xl"></i> Deportistas</span>
                    <i class="fas fa-chevron-right text-slate-300"></i>
                </button>
                <button onclick="app.navigateTo('view-coach-home')" class="w-full bg-slate-800 text-white py-4 px-6 rounded-2xl flex items-center justify-between font-bold shadow-lg active:scale-95 group">
                    <span class="flex items-center gap-3"><i class="fas fa-whistle text-blue-400 text-xl"></i> Entrenadores</span>
                    <i class="fas fa-chevron-right text-slate-500"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- ATHLETE: HOME -->
    <section id="view-athlete-home" class="view content-view">
        <header class="header-gradient text-white p-8 rounded-b-[3rem] shadow-xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-orange-100 text-sm font-medium">¡Hola, Martín!</p>
                    <h2 class="text-3xl font-black">Próximo Plan</h2>
                </div>
                <div class="bg-white/20 backdrop-blur-md p-3 rounded-2xl text-center border border-white/20">
                    <span class="block text-[10px] uppercase font-bold text-orange-100">Racha</span>
                    <span class="text-2xl font-black" id="stat-racha">🔥 0</span>
                </div>
            </div>
            <div id="active-workout-card" class="bg-white text-slate-800 p-5 rounded-3xl shadow-xl">
                <!-- Se llena desde JS -->
            </div>
        </header>

        <div class="p-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <h3 class="font-black text-lg mb-4 flex items-center gap-2"><i class="fas fa-check-circle text-green-500"></i> Validar Actividad</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="label-tiny">Distancia calculada (Kms)</label>
                        <input type="number" id="input-km" class="input-field bg-slate-100" readonly>
                    </div>
                    <div>
                        <label class="label-tiny">Tiempo Real</label>
                        <input type="text" id="input-time" class="input-field" placeholder="45:20">
                    </div>
                    <div>
                        <label class="label-tiny">Esfuerzo (RPE)</label>
                        <input type="number" id="input-rpe" min="1" max="10" class="input-field" placeholder="1-10">
                    </div>
                    <button onclick="app.validateActivity()" class="col-span-2 bg-orange-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition mt-2">
                        CONFIRMAR Y SUMAR
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- ATHLETE: METRICS (LA QUE NO SE VEÍA) -->
    <section id="view-metrics" class="view content-view p-6">
        <h2 class="text-2xl font-black mb-6">Mis Métricas</h2>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="label-tiny">Total Kms</p>
                <p class="text-3xl font-black text-orange-600" id="total-km-display">0.0</p>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="label-tiny">Sesiones</p>
                <p class="text-3xl font-black text-slate-800" id="total-sessions-display">0</p>
            </div>
        </div>
        <h3 class="font-bold text-slate-400 text-[10px] uppercase tracking-widest mb-4">Análisis por Tipo</h3>
        <div id="metrics-breakdown" class="space-y-3">
            <!-- Se llena dinámicamente -->
        </div>
    </section>

    <!-- ATHLETE: COMMUNITY (LA QUE NO SE VEÍA) -->
    <section id="view-community" class="view content-view p-6">
        <h2 class="text-2xl font-black mb-2">Comunidad</h2>
        <p class="text-slate-400 text-sm mb-6">Ranking semanal del grupo</p>
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div id="leaderboard" class="divide-y divide-slate-50">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </section>

    <!-- ATHLETE: PROFILE (BIO-MÉTRICAS) -->
    <section id="view-profile" class="view content-view p-6">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 text-2xl font-black">MP</div>
            <div>
                <h2 class="text-2xl font-black leading-tight">Martín Pérez</h2>
                <p class="text-slate-400 text-xs font-bold uppercase">Socio #101</p>
            </div>
        </div>
        
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="label-tiny mb-4 italic">Composición Corporal Avanzada</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="label-tiny">Peso</label><input type="text" class="input-field text-xs" value="72kg"></div>
                    <div><label class="label-tiny">Grasa %</label><input type="text" class="input-field text-xs" value="12.5%"></div>
                    <div><label class="label-tiny">Músculo %</label><input type="text" class="input-field text-xs" value="44%"></div>
                    <div><label class="label-tiny">Agua %</label><input type="text" class="input-field text-xs" value="60%"></div>
                    <div><label class="label-tiny">G. Visceral</label><input type="text" class="input-field text-xs" value="4"></div>
                    <div><label class="label-tiny">Masa Magra</label><input type="text" class="input-field text-xs" value="62kg"></div>
                </div>
            </div>
            <button onclick="app.navigateTo('view-login')" class="w-full p-4 text-slate-400 font-bold text-sm">Cerrar Sesión</button>
        </div>
    </section>

    <!-- COACH: HOME -->
    <section id="view-coach-home" class="view p-6 pb-24">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">Coach Dashboard</h2>
            <button onclick="app.navigateTo('view-login')" class="bg-slate-200 p-2 rounded-xl text-xs font-black uppercase tracking-tighter">Salir</button>
        </div>

        <!-- Creador -->
        <div class="bg-slate-800 text-white p-6 rounded-[2.5rem] shadow-xl mb-8">
            <h3 class="font-black mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-blue-400"></i> Planificar</h3>
            <div class="space-y-4">
                <select id="coach-type" class="w-full bg-slate-700 p-3 rounded-xl border-none text-sm font-bold">
                    <option value="Pasadas">Pasadas (Intervalos)</option>
                    <option value="Fondo">Fondo Largo</option>
                    <option value="Cuestas">Cuestas</option>
                </select>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="coach-bloques" placeholder="Bloques" class="bg-slate-700 p-3 rounded-xl text-xs">
                    <input type="number" id="coach-vueltas" placeholder="Vueltas" class="bg-slate-700 p-3 rounded-xl text-xs">
                    <input type="number" id="coach-dist" placeholder="Mts/Vta" class="bg-slate-700 p-3 rounded-xl text-xs">
                </div>
                <button onclick="app.createWorkout()" class="w-full bg-blue-500 py-4 rounded-2xl font-black shadow-lg active:scale-95">PUBLICAR PLAN</button>
            </div>
        </div>

        <!-- Seguimiento de Alumnos (CLAVE) -->
        <h3 class="label-tiny mb-4 tracking-widest">Seguimiento de Alumnos</h3>
        <div id="coach-student-list" class="space-y-3">
            <!-- Dinámico -->
        </div>
    </section>

    <!-- NAV INFERIOR -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around items-center py-4 z-50">
        <button onclick="app.navigateTo('view-athlete-home')" class="nav-item" id="nav-view-athlete-home"><i class="fas fa-calendar-day text-xl"></i></button>
        <button onclick="app.navigateTo('view-metrics')" class="nav-item" id="nav-view-metrics"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="app.navigateTo('view-community')" class="nav-item" id="nav-view-community"><i class="fas fa-users text-xl"></i></button>
        <button onclick="app.navigateTo('view-profile')" class="nav-item" id="nav-view-profile"><i class="fas fa-id-card text-xl"></i></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
