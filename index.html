<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Runner Pro - High Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-50 text-slate-900">
    <!-- HEADER GLOBAL: Aparece solo al loguear -->
    <header id="app-header" class="hidden fixed top-0 w-full bg-white/95 backdrop-blur-md z-[100] border-b border-slate-100 px-5 py-3 flex justify-between items-center shadow-sm">
      <div class="flex items-center gap-3">
        <img id="header-user-img" src="https://i.pravatar.cc/150?u=athlete" class="w-10 h-10 rounded-full border-2 border-orange-500" />
        <div class="leading-none">
          <p id="header-user-name" class="text-sm font-black text-slate-800">Martín Pérez</p>
          <p id="header-user-role" class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">Deportista Elite</p>
        </div>
      </div>
      <button id="btn-logout" class="w-10 h-10 flex items-center justify-center bg-slate-50 text-slate-400 rounded-xl hover:text-red-500 transition-colors">
        <i class="fas fa-power-off"></i>
      </button>
    </header>

    <!-- LOGIN VIEW: Pantalla de entrada -->
    <section id="view-login" class="active fixed inset-0 z-[200] flex items-center justify-center bg-slate-100 px-6">
      <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center border border-slate-200">
        <div class="mb-10">
          <div class="bg-orange-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg rotate-3">
            <i class="fas fa-running text-white text-3xl"></i>
          </div>
          <h1 class="text-4xl font-black text-slate-800 tracking-tighter italic uppercase">Hacemos Fondo?</h1>
          <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Prof. Carlos - Poli 10</p>
        </div>
        <div class="space-y-4">
          <button id="btn-login-athlete" class="w-full bg-white border-2 border-slate-100 py-4 px-6 rounded-2xl flex items-center justify-between font-bold hover:bg-slate-50 transition-all active:scale-95">
            <span class="flex items-center gap-3"><i class="fas fa-user-astronaut text-orange-600 text-xl"></i> Deportistas</span>
            <i class="fas fa-chevron-right text-slate-300"></i>
          </button>
          <button id="btn-login-coach" class="w-full bg-slate-900 text-white py-4 px-6 rounded-2xl flex items-center justify-between font-bold shadow-xl active:scale-95 transition-all">
            <span class="flex items-center gap-3"><i class="fas fa-whistle text-blue-400 text-xl"></i> Entrenadores</span>
            <i class="fas fa-chevron-right text-slate-500"></i>
          </button>
        </div>
        <div class="mt-8 text-center">
          <button id="btn-login-admin" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest hover:text-slate-600 transition-colors">Administrador</button>
        </div>
      </div>
    </section>

    <!-- VISTAS DE ALUMNO -->
    <!-- 1. HOME: PRÓXIMO PLAN Y AUTOCARGA -->
    <section id="view-athlete-home" class="view content-view px-6">
      <div id="athlete-pending-workouts">
        <!-- JS inyectará los entrenamientos asignados aquí -->
      </div>
      <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 mb-6 mt-6">
        <h3 class="label-tiny mb-4 italic text-orange-600">Cargar Actividad Manual</h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="label-tiny">Deporte</label>
            <select id="athlete-manual-sport" class="input-field"></select>
          </div>
          <div class="col-span-2">
            <label class="label-tiny">Distancia (Kms)</label>
            <input type="number" id="athlete-manual-km" class="input-field bg-slate-50 font-black text-orange-600" placeholder="Ej: 10.5" />
          </div>
          <div>
            <label class="label-tiny">Tiempo Logrado</label>
            <input type="text" id="athlete-manual-time" class="input-field" placeholder="00:45:00" />
          </div>
          <div>
            <label class="label-tiny">Esfuerzo (RPE 1-10)</label>
            <input type="number" id="athlete-manual-rpe" class="input-field" value="7" />
          </div>
          <button id="btn-manual-activity" class="col-span-2 bg-orange-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-orange-100 mt-2 active:scale-95">
            GUARDAR ACTIVIDAD
          </button>
        </div>
      </div>
    </section>

    <!-- 2. METRICS: HISTORIAL -->
    <section id="view-metrics" class="view content-view px-6">
      <h2 class="text-2xl font-black mb-6 italic uppercase">Análisis de Datos</h2>
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
          <p class="label-tiny">Total Semanal</p>
          <p class="text-3xl font-black text-orange-600" id="total-km-display">145.8</p>
        </div>
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
          <p class="label-tiny">Sesiones Mes</p>
          <p class="text-3xl font-black text-slate-800">24</p>
        </div>
      </div>
      <h3 class="label-tiny mb-4 tracking-widest italic">Historial Completo</h3>
      <div id="history-list" class="space-y-3 pb-10"></div>
    </section>

    <!-- 3. COMMUNITY: RANKING -->
    <section id="view-community" class="view content-view px-6">
      <h2 class="text-2xl font-black mb-2 italic">Leaderboard</h2>
      <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">Ranking Grupal Semanal</p>
      <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden mb-10">
        <div id="leaderboard-list" class="divide-y divide-slate-50"></div>
      </div>
    </section>

    <!-- 4. PROFILE: BIO-MÉTRICAS Y OBJETIVOS -->
    <section id="view-profile" class="view content-view px-6">
      <!-- Mismo HTML estático de Perfil que ya tenías -->
    </section>

    <!-- VISTAS DE ENTRENADOR -->
    <!-- 1. PLANIFICAR -->
    <section id="view-coach-plan" class="view content-view px-6">
      <h2 class="text-2xl font-black mb-6 italic uppercase">Programar Sesión</h2>
      <div class="bg-slate-900 text-white p-8 rounded-[3rem] shadow-2xl space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="label-tiny text-slate-400">Asignar a Alumno</label>
            <select id="coach-athlete-select" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-sm font-bold text-white outline-none"></select>
          </div>
          <div class="col-span-2">
            <label class="label-tiny text-slate-400">Deporte</label>
            <select id="coach-sport-select" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-sm font-bold text-white outline-none"></select>
          </div>
          <div class="col-span-2">
            <label class="label-tiny text-slate-400">Título del Entrenamiento</label>
            <input type="text" id="coach-title" placeholder="Ej: 8x800m Pasadas" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-sm text-white outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div class="col-span-2">
            <label class="label-tiny text-slate-400">Tipo de Actividad</label>
            <select id="coach-type" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-sm font-bold text-white outline-none">
              <option>Pasadas (Intervalos)</option><option>Fartlek</option><option>Cuestas</option><option>Fondo Largo</option><option>Tempo / Umbral</option>
            </select>
          </div>
          <div><label class="label-tiny text-slate-400">Bloques</label><input type="number" id="coach-bloques" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-white" value="3" /></div>
          <div><label class="label-tiny text-slate-400">Vueltas</label><input type="number" id="coach-vueltas" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-white" value="4" /></div>
          <div><label class="label-tiny text-slate-400">Dist. Vta (mts)</label><input type="number" id="coach-dist" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-white" value="800" /></div>
          <div><label class="label-tiny text-slate-400">Ritmo Vta</label><input type="text" id="coach-pace" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-white" value="2:10" /></div>
          <div><label class="label-tiny text-slate-400">Zona (Z1-Z5)</label><input type="text" id="coach-zone" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-white" value="Z4" /></div>
          <div><label class="label-tiny text-slate-400">Lugar</label><input type="text" id="coach-place" class="w-full bg-slate-800 p-3 rounded-2xl border-none text-white" value="Pista Central" /></div>
        </div>
        <button id="btn-create-workout" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-3xl font-black shadow-xl uppercase tracking-widest text-xs transition-all">
          Publicar Entrenamiento
        </button>
      </div>
    </section>

    <!-- 2. RESUMEN ALUMNOS -->
    <section id="view-coach-students" class="view content-view px-6">
      <h2 class="text-2xl font-black mb-2 italic">Mis Alumnos</h2>
      <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">Seguimiento de Rendimiento Grupal</p>
      <div id="coach-student-list" class="space-y-4 pb-10"></div>
    </section>

    <!-- NAV INFERIOR CONTEXTUAL -->
    <nav id="bottom-nav" class="hidden fixed bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center py-4 z-50"></nav>

    <!-- VISTAS DE ADMIN -->
    <section id="view-admin" class="view content-view px-6">
      <h2 class="text-2xl font-black mb-6 italic uppercase">Panel de Control</h2>
      <div class="grid grid-cols-1 gap-4 pb-10" id="admin-dashboard-cards"></div>
    </section>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
